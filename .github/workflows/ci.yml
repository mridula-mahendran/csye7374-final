name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Gate 1: static analysis. Fast, no services. Lint and security are blocking;
  # type checking is advisory by default (flip continue-on-error to make it a
  # hard gate once the codebase is fully typed).
  # ---------------------------------------------------------------------------
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check .
      - name: Bandit (SAST)
        run: bandit -q -ll -r app
      - name: Mypy (type check, advisory)
        continue-on-error: true
        run: mypy app

  # ---------------------------------------------------------------------------
  # Gate 2: unit + integration tests with a real Postgres, behind a coverage
  # gate. "Did the line run, and did it behave?"
  # ---------------------------------------------------------------------------
  unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TESTING: "1"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/appdb_test
      JWT_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests with coverage gate
        run: |
          coverage run -m pytest -q
          coverage report --fail-under=85
          coverage xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ---------------------------------------------------------------------------
  # Gate 3: Schemathesis. Property-based + stateful API testing against the
  # running app, generated from the OpenAPI schema. "Does the API honor its own
  # contract on inputs no one thought to write a test for?"
  # ---------------------------------------------------------------------------
  contract:
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/appdb
      JWT_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Start the API
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
      - name: Register a user and mint a token
        id: token
        run: |
          EMAIL="ci_$(date +%s)@example.com"
          curl -sf -X POST http://localhost:8000/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"Str0ngPassw0rd!\"}"
          TOKEN=$(curl -sf -X POST http://localhost:8000/auth/token \
            -d "username=$EMAIL&password=Str0ngPassw0rd!" \
            | python -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: Schemathesis (property-based + stateful)
        # Two checks are excluded on purpose (tuning, not silencing real bugs):
        #  - positive_data_acceptance: false-positives on FastAPI form bodies and
        #    on nullable optional query params (a `status=null` string the enum
        #    can't coerce). The app behavior is correct; the check is too strict.
        #  - unsupported_method: /tasks/stats is intentionally shadowed by
        #    /tasks/{task_id}, so PATCH /tasks/stats is a 422 (bad id) not a 405.
        # The high-value checks (not_a_server_error, status_code_conformance,
        # response_schema_conformance, ...) stay on and are what the demo relies on.
        run: |
          schemathesis run http://localhost:8000/openapi.json \
            --max-examples=150 \
            --exclude-checks positive_data_acceptance,unsupported_method \
            --header "Authorization: Bearer ${{ steps.token.outputs.token }}"

  # ---------------------------------------------------------------------------
  # Gate 4: k6. Smoke load test with latency and error-rate budgets as native
  # thresholds. "Is it fast enough, not just correct?"
  # ---------------------------------------------------------------------------
  performance:
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/appdb
      JWT_SECRET: ci-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Start the API
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
      - name: k6 smoke load test (fails on p95 / error budget)
        run: |
          docker run --rm --network host \
            -e BASE_URL=http://localhost:8000 -e VUS=10 -e DURATION=20s \
            -v "$PWD/perf:/perf" grafana/k6 run /perf/smoke.js
